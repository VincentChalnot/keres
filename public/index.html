<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arx Game</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <style>
    html {
      background-color: #000000;
    }
    #board-container {
      position: relative;
      display: inline-block;
    }
    .board-wrapper {
      position: relative;
      width: 800px; /* Will be adjusted based on board aspect ratio */
      height: 655px; /* 800 * (3163/3860) */
      background-image: url('images/board.jpg');
      background-size: cover;
      background-position: center;
      cursor: pointer;
    }
    .board-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .tile-overlay {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
    }
    .tile-overlay.selected {
      background-color: rgba(127, 160, 221, 0.5); /* Cornflower blue */
    }
    .tile-overlay.possible-move {
      background-color: rgba(85, 209, 87, 0.5); /* Light green */
    }
    .tile-overlay.hovered-move {
      background-color: rgba(225, 202, 88, 0.5); /* Soft yellow */
    }
    .piece {
      position: absolute;
      pointer-events: none;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
    .board-labels {
      position: absolute;
      color: white;
      font-weight: bold;
      font-size: 14px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    .game-container {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .move-history {
      min-width: 250px;
      flex-shrink: 0;
    }
    .move-history textarea {
      font-family: monospace;
      width: 100%;
      height: 400px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title">Arx</h1>
      <div class="game-container">
        <div>
          <div id="board-container"></div>
          <div id="status">Loading...</div>
          <div class="buttons mt-4">
            <a href="/" class="button is-warning">Reset board</a>
            <button class="button is-primary" id="switch-sides-btn">Switch Sides</button>
            <button class="button is-info" id="ask-engine-btn">Ask Engine</button>
          </div>
        </div>
        <div class="move-history">
          <label class="label">Move History</label>
          <textarea class="textarea" id="move-history" placeholder="B1-D2 F9-E8&#10;E1-F2 B7-C6&#10;..."></textarea>
          <div class="buttons mt-2">
            <button class="button is-info" id="load-game-btn">Load</button>
            <button class="button is-warning" id="undo-btn">Undo</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="modal" id="unstack-modal">
    <div class="modal-background"></div>
    <div class="modal-card">
      <header class="modal-card-head">
        <p class="modal-card-title">Choose your move</p>
      </header>
      <section class="modal-card-body">
        <p>You are moving a stacked piece. Do you want to move the full stack or only the top piece?</p>
      </section>
      <footer class="modal-card-foot">
        <button class="button" id="move-stack">Move Full Stack</button>
        <button class="button" id="move-unstack">Move Top Piece</button>
      </footer>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

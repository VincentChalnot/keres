[rules_title]
  other = "Règles du Jeu Keres"
[rules_intro]
  other = "Jeu combinatoire abstrait sur plateau 9×9 avec des pièces empilables"
[rules_objective_title]
  other = "Objectif du Jeu"
[rules_objective_text]
  other = "Victoire : La partie se termine immédiatement lorsqu'un joueur capture le Roi adverse."
[rules_basics_title]
  other = "Principes de Base"
[rules_basics_1]
  other = "Le plateau est un damier 9×9"
[rules_basics_2]
  other = "À chaque tour, un joueur déplace une seule pièce ou pile"
[rules_basics_3]
  other = "Une pièce capture une pièce ennemie en se déplaçant sur sa case"
[rules_basics_4]
  other = "Capturer une pile retire la pile entière"
[rules_basics_5]
  other = "Les pièces ne peuvent pas traverser d'autres pièces (sauf le cavalier)"
[rules_stacking_title]
  other = "Règles d'Empilement"
[rules_stacking_text]
  other = "Les pièces peuvent être empilées pour fusionner leurs capacités de mouvement. Une pile se déplace en combinant tous les mouvements possibles des pièces qui la composent."
[rules_stacking_conditions_title]
  other = "Conditions d'empilement :"
[rules_stacking_cond_1]
  other = "La pièce cible doit être accessible selon le mouvement de la pièce qui se déplace"
[rules_stacking_cond_2]
  other = "La pièce cible ne doit pas déjà être empilée"
[rules_stacking_cond_3]
  other = "Le Roi ne peut jamais être empilé"
[rules_separation_title]
  other = "Séparation :"
[rules_separation_text]
  other = "Une pile peut être séparée en déplaçant uniquement la pièce du dessus selon son propre mouvement."
[rules_position_title]
  other = "Disposition Initiale"
[rules_pieces_title]
  other = "Les Pièces et Leurs Mouvements"

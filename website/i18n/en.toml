[rules_title]
  other = "Keres Game Rules"
[rules_intro]
  other = "Abstract combinatorial game on a 9×9 board with stackable pieces"
[rules_objective_title]
  other = "Objective"
[rules_objective_text]
  other = "Victory: The game ends immediately when a player captures the opponent's King."
[rules_basics_title]
  other = "Basic Principles"
[rules_basics_1]
  other = "The board is a 9×9 checkerboard"
[rules_basics_2]
  other = "On each turn, a player moves a single piece or stack"
[rules_basics_3]
  other = "A piece captures an enemy piece by moving onto its square"
[rules_basics_4]
  other = "Capturing a stack removes the entire stack"
[rules_basics_5]
  other = "Pieces cannot pass through other pieces (except the Knight)"
[rules_stacking_title]
  other = "Stacking Rules"
[rules_stacking_text]
  other = "Pieces can be stacked to merge their movement abilities. A stack moves by combining all possible movements of the pieces that compose it."
[rules_stacking_conditions_title]
  other = "Stacking conditions:"
[rules_stacking_cond_1]
  other = "The target piece must be reachable according to the moving piece's movement"
[rules_stacking_cond_2]
  other = "The target piece must not already be stacked"
[rules_stacking_cond_3]
  other = "The King can never be stacked"
[rules_separation_title]
  other = "Separation:"
[rules_separation_text]
  other = "A stack can be separated by moving only the top piece according to its own movement."

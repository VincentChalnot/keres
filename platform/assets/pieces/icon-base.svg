<svg xmlns="http://www.w3.org/2000/svg" viewBox="-45 -45 90 90">
    <defs>
        <circle id="dot" fill="var(--piece-fg, #000000)" cx="0" cy="0" r="2"/>
        <g id="dots-soldier">
            <use href="#dot" transform="translate(23.33, -23.33)"/>
            <use href="#dot" transform="translate(-23.33, -23.33)"/>
        </g>
        <g id="dots-ballista">
            <use href="#dot" transform="translate(0, -33)"/>
        </g>
        <g id="dots-orthogonal">
            <use href="#dot" transform="translate(0, 33)"/>
            <use href="#dot" transform="translate(0, -33)"/>
            <use href="#dot" transform="translate(33, 0)"/>
            <use href="#dot" transform="translate(-33, 0)"/>
        </g>
        <g id="dots-diagonal">
            <use href="#dot" transform="translate(23.33, 23.33)"/>
            <use href="#dot" transform="translate(23.33, -23.33)"/>
            <use href="#dot" transform="translate(-23.33, 23.33)"/>
            <use href="#dot" transform="translate(-23.33, -23.33)"/>
        </g>
        <g id="dots-knight">
            <use href="#dot" transform="translate(14.76, 29.52)"/>
            <use href="#dot" transform="translate(14.76, -29.52)"/>
            <use href="#dot" transform="translate(-14.76, 29.52)"/>
            <use href="#dot" transform="translate(-14.76, -29.52)"/>
            <use href="#dot" transform="translate(29.52, 14.76)"/>
            <use href="#dot" transform="translate(29.52, -14.76)"/>
            <use href="#dot" transform="translate(-29.52, 14.76)"/>
            <use href="#dot" transform="translate(-29.52, -14.76)"/>
        </g>
    </defs>
    <circle cx="0" cy="0" r="45" fill="none" stroke="var(--piece-fg, #000000)" stroke-width="0.2"/>
    <circle cx="0" cy="0" r="27" fill="none" stroke="var(--piece-fg, #000000)" stroke-width="0.2"/>
    <path class="piece-ring" fill="var(--piece-fg, #000000)" fill-rule="evenodd"
          d="M 0,-41 a 41,41 0 1,0 0,82 a 41,41 0 1,0 0,-82 Z
             M 0,-39 a 39,39 0 1,0 0,78 a 39,39 0 1,0 0,-78 Z"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-25 0 925 745">
    <g id="board-layer">
        <use href="#board-row-odd" y="0"/>
        <use href="#board-row-even" y="80"/>
        <use href="#board-row-odd" y="160"/>
        <use href="#board-row-even" y="240"/>
        <use href="#board-row-odd" y="320"/>
        <use href="#board-row-even" y="400"/>
        <use href="#board-row-odd" y="480"/>
        <use href="#board-row-even" y="560"/>
        <use href="#board-row-odd" y="640"/>
    </g>
    <g id="coords-layer">
        <!-- Row labels (1-9, top=9 to bottom=1 for white's perspective) -->
        <text class="coord-label" x="-12.5" y="40"  text-anchor="middle" dominant-baseline="central">9</text>
        <text class="coord-label" x="-12.5" y="120" text-anchor="middle" dominant-baseline="central">8</text>
        <text class="coord-label" x="-12.5" y="200" text-anchor="middle" dominant-baseline="central">7</text>
        <text class="coord-label" x="-12.5" y="280" text-anchor="middle" dominant-baseline="central">6</text>
        <text class="coord-label" x="-12.5" y="360" text-anchor="middle" dominant-baseline="central">5</text>
        <text class="coord-label" x="-12.5" y="440" text-anchor="middle" dominant-baseline="central">4</text>
        <text class="coord-label" x="-12.5" y="520" text-anchor="middle" dominant-baseline="central">3</text>
        <text class="coord-label" x="-12.5" y="600" text-anchor="middle" dominant-baseline="central">2</text>
        <text class="coord-label" x="-12.5" y="680" text-anchor="middle" dominant-baseline="central">1</text>
        <!-- Column labels (A-I, left to right for white's perspective) -->
        <text class="coord-label" x="50"  y="732.5" text-anchor="middle" dominant-baseline="central">A</text>
        <text class="coord-label" x="150" y="732.5" text-anchor="middle" dominant-baseline="central">B</text>
        <text class="coord-label" x="250" y="732.5" text-anchor="middle" dominant-baseline="central">C</text>
        <text class="coord-label" x="350" y="732.5" text-anchor="middle" dominant-baseline="central">D</text>
        <text class="coord-label" x="450" y="732.5" text-anchor="middle" dominant-baseline="central">E</text>
        <text class="coord-label" x="550" y="732.5" text-anchor="middle" dominant-baseline="central">F</text>
        <text class="coord-label" x="650" y="732.5" text-anchor="middle" dominant-baseline="central">G</text>
        <text class="coord-label" x="750" y="732.5" text-anchor="middle" dominant-baseline="central">H</text>
        <text class="coord-label" x="850" y="732.5" text-anchor="middle" dominant-baseline="central">I</text>
    </g>
    <g id="overlays-layer"/>
    <g id="pieces-layer">
        <!-- Black -->
        <use href="#piece-ballista" class="p-b p-r" x="0" y="0"/>
        <use href="#piece-knight" class="p-b p-r" x="100" y="0"/>
        <use href="#piece-paladin" class="p-b p-r" x="200" y="0"/>
        <use href="#piece-guard" class="p-b p-r" x="300" y="0"/>
        <use href="#piece-king" class="p-b p-r" x="400" y="0"/>
        <use href="#piece-guard" class="p-b p-r" x="500" y="0"/>
        <use href="#piece-paladin" class="p-b p-r" x="600" y="0"/>
        <use href="#piece-knight" class="p-b p-r" x="700" y="0"/>
        <use href="#piece-ballista" class="p-b p-r" x="800" y="0"/>
        <use href="#piece-rook" class="p-b p-r" x="200" y="80"/>
        <use href="#piece-bishop" class="p-b p-r" x="600" y="80"/>
        <use href="#piece-soldier" class="p-b p-r" x="0" y="160"/>
        <use href="#piece-soldier" class="p-b p-r" x="100" y="160"/>
        <use href="#piece-soldier" class="p-b p-r" x="200" y="160"/>
        <use href="#piece-soldier" class="p-b p-r" x="300" y="160"/>
        <use href="#piece-soldier" class="p-b p-r" x="400" y="160"/>
        <use href="#piece-soldier" class="p-b p-r" x="500" y="160"/>
        <use href="#piece-soldier" class="p-b p-r" x="600" y="160"/>
        <use href="#piece-soldier" class="p-b p-r" x="700" y="160"/>
        <use href="#piece-soldier" class="p-b p-r" x="800" y="160"/>
        <!-- White -->
        <use href="#piece-soldier" class="p-w" x="0" y="480"/>
        <use href="#piece-soldier" class="p-w" x="100" y="480"/>
        <use href="#piece-soldier" class="p-w" x="200" y="480"/>
        <use href="#piece-soldier" class="p-w" x="300" y="480"/>
        <use href="#piece-soldier" class="p-w" x="400" y="480"/>
        <use href="#piece-soldier" class="p-w" x="500" y="480"/>
        <use href="#piece-soldier" class="p-w" x="600" y="480"/>
        <use href="#piece-soldier" class="p-w" x="700" y="480"/>
        <use href="#piece-soldier" class="p-w" x="800" y="480"/>
        <use href="#piece-rook" class="p-w" x="600" y="560"/>
        <use href="#piece-bishop" class="p-w" x="200" y="560"/>
        <use href="#piece-ballista" class="p-w" x="0" y="640"/>
        <use href="#piece-knight" class="p-w" x="100" y="640"/>
        <use href="#piece-paladin" class="p-w" x="200" y="640"/>
        <use href="#piece-guard" class="p-w" x="300" y="640"/>
        <use href="#piece-king" class="p-w" x="400" y="640"/>
        <use href="#piece-guard" class="p-w" x="500" y="640"/>
        <use href="#piece-paladin" class="p-w" x="600" y="640"/>
        <use href="#piece-knight" class="p-w" x="700" y="640"/>
        <use href="#piece-ballista" class="p-w" x="800" y="640"/>
    </g>
</svg>

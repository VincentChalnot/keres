# see https://symfony.com/doc/current/reference/configuration/framework.html
parameters:
    # Default to empty string = trust no proxy (safe for dev where Caddy is the edge).
    # Prod sets TRUSTED_PROXIES to the docker network CIDR Traefik uses to reach us.
    env(TRUSTED_PROXIES): ''

framework:
    secret: '%env(APP_SECRET)%'

    # Trust X-Forwarded-* headers from these IPs/ranges so Request::getClientIp()
    # returns the real client instead of the reverse proxy.  Comma-separated.
    trusted_proxies: '%env(TRUSTED_PROXIES)%'

    # Note that the session will be started ONLY if you read or write from it.
    # cookie_domain scopes the session cookie to the parent domain (e.g.
    # local.playkeres.com / playkeres.com) instead of just the app subdomain.
    # This is required for Symfony's HttpUtils domain-regexp redirect guard to
    # allow the logout target (STATIC_SITE_URL) to point at a sibling
    # subdomain — without it, every cross-subdomain redirect target silently
    # collapses to "/" (see Symfony\Bundle\SecurityBundle\DependencyInjection\
    # Compiler\AddSessionDomainConstraintPass).
    session:
        cookie_domain: '%env(SESSION_COOKIE_DOMAIN)%'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file

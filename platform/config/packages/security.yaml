security:
    role_hierarchy:
        ROLE_ADMIN: ROLE_USER

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\MultiProviderOidcAuthenticator
                - App\Security\DevLoginAuthenticator
            entry_point: App\Security\MultiProviderOidcAuthenticator
            logout:
                path: logout
                target: '%env(STATIC_SITE_URL)%'

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/play, roles: ROLE_USER }
        - { path: ^/feedback, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

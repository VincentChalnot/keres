<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCTS Tree Visualizer</title>
  <script src="d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #818cf8;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    #drop-zone {
      flex: 1;
      border: 2px dashed #3d4266;
      border-radius: 8px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #818cf8;
      background: #1e2240;
      color: #c7d2fe;
    }
    #drop-zone svg { flex-shrink: 0; }
    #file-input { display: none; }

    #stats-bar {
      display: none;
      gap: 16px;
      align-items: center;
      flex-shrink: 0;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    #stats-bar span { white-space: nowrap; }
    #stats-bar strong { color: #c7d2fe; }

    #legend {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      font-size: 0.75rem;
      color: #94a3b8;
    }
    #legend-bar {
      width: 100px;
      height: 12px;
      border-radius: 3px;
    }

    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas {
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #canvas:active { cursor: grabbing; }

    #tooltip {
      position: absolute;
      background: #1a1d27;
      border: 1px solid #3d4266;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      pointer-events: none;
      display: none;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 100;
    }
    #tooltip .tt-action {
      font-size: 1rem;
      font-weight: 700;
      color: #818cf8;
      margin-bottom: 6px;
    }
    #tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 2px 0;
      color: #94a3b8;
    }
    #tooltip .tt-row span:last-child { color: #e2e8f0; font-weight: 500; }
    #tooltip .tt-divider { border-top: 1px solid #2d3148; margin: 6px 0; }

    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #4a5180;
      pointer-events: none;
    }
    #empty-state svg { opacity: 0.4; }
    #empty-state p { font-size: 1rem; }
    #empty-state small { font-size: 0.8rem; color: #3d4266; }

    .node circle {
      stroke-width: 1.5px;
      cursor: pointer;
      transition: r 0.15s;
    }
    .node circle:hover { stroke-width: 3px; }
    .node.collapsed circle { stroke-dasharray: 4 2; }

    .node text {
      font-size: 10px;
      fill: #94a3b8;
      pointer-events: none;
      dominant-baseline: middle;
    }

    .link {
      fill: none;
      stroke: #2d3148;
      stroke-width: 1.5px;
    }

    #controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ctrl-btn {
      width: 34px;
      height: 34px;
      background: #1a1d27;
      border: 1px solid #3d4266;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .ctrl-btn:hover { background: #252840; color: #c7d2fe; }
  </style>
</head>
<body>

<header>
  <h1>MCTS Tree Visualizer</h1>

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Drop JSON file here or click to browse
    <input type="file" id="file-input" accept=".json,application/json" />
  </div>

  <div id="stats-bar">
    <span>Nodes: <strong id="stat-nodes">—</strong></span>
    <span>Root visits: <strong id="stat-visits">—</strong></span>
    <span>Root value: <strong id="stat-value">—</strong></span>
    <span>Turn: <strong id="stat-turn">—</strong></span>
  </div>

  <div id="legend">
    <span>Low</span>
    <canvas id="legend-bar" width="100" height="12"></canvas>
    <span>High</span>
  </div>
</header>

<div id="main">
  <svg id="canvas"></svg>
  <div id="empty-state">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <p>No data loaded</p>
    <small>Upload a JSON file exported from the Keres MCTS engine</small>
  </div>
  <div id="tooltip"></div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-zoom-in" title="Zoom in">+</button>
    <button class="ctrl-btn" id="btn-zoom-out" title="Zoom out">−</button>
    <button class="ctrl-btn" id="btn-reset" title="Reset view">⌖</button>
  </div>
</div>

<script>
// ─── Color scale ───────────────────────────────────────────────────────────────
const colorScale = d3.scaleSequential()
  .domain([0, 1])
  .interpolator(d3.interpolateRdYlGn);

// Draw legend gradient
(function() {
  const canvas = document.getElementById('legend-bar');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 100, 0);
  for (let i = 0; i <= 10; i++) {
    grad.addColorStop(i / 10, colorScale(i / 10));
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 100, 12);
})();

// ─── File drop / upload ────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      renderTree(data);
    } catch (err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── Tree rendering ────────────────────────────────────────────────────────────
const NODE_RADIUS = 8;
const NODE_SPACING_X = 220;   // horizontal gap between parent center and child center
const NODE_SPACING_Y = 28;    // vertical gap between siblings
const INITIAL_OFFSET_X = 80;  // initial horizontal translation for root node
const MIN_NODE_RADIUS = 5;    // minimum node radius (px)
const MAX_NODE_RADIUS = 14;   // maximum node radius (px)

let globalRoot = null;
let globalUpdate = null;

function countNodes(d) {
  let n = 1;
  if (d.children) d.children.forEach(c => n += countNodes(c));
  if (d._children) d._children.forEach(c => n += countNodes(c));
  return n;
}

function renderTree(rawData) {
  // ── populate stats bar
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('stat-nodes').textContent = countNodes(rawData).toLocaleString();
  document.getElementById('stat-visits').textContent = rawData.visits?.toLocaleString() ?? '—';
  document.getElementById('stat-value').textContent = rawData.mean_value != null
    ? rawData.mean_value.toFixed(4) : '—';
  document.getElementById('stat-turn').textContent =
    rawData.white_to_move != null ? (rawData.white_to_move ? '⬜ White' : '⬛ Black') : '—';

  document.getElementById('empty-state').style.display = 'none';

  // ── build d3 hierarchy
  const root = d3.hierarchy(rawData, d => d.children);

  // Collapse nodes beyond depth 2 by default
  root.each(d => {
    if (d.depth >= 2 && d.children) {
      d._children = d.children;
      d.children = null;
    }
  });

  globalRoot = root;

  const svg = d3.select('#canvas');
  svg.selectAll('*').remove();

  const { width, height } = document.getElementById('main').getBoundingClientRect();

  const zoom = d3.zoom()
    .scaleExtent([0.05, 5])
    .on('zoom', e => g.attr('transform', e.transform));

  svg.call(zoom);

  const g = svg.append('g');

  // zoom controls
  document.getElementById('btn-zoom-in').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.4);
  document.getElementById('btn-zoom-out').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);
  document.getElementById('btn-reset').onclick = () => {
    svg.transition().duration(400).call(
      zoom.transform,
      d3.zoomIdentity.translate(INITIAL_OFFSET_X, height / 2).scale(1)
    );
  };

  const treeLayout = d3.tree()
    .nodeSize([NODE_SPACING_Y, NODE_SPACING_X])
    .separation((a, b) => (a.parent === b.parent ? 1 : 1.2));

  const tooltip = document.getElementById('tooltip');

  function update(source) {
    treeLayout(root);

    // links
    const linkSel = g.selectAll('.link')
      .data(root.links(), d => d.target.data.node_id);

    linkSel.join(
      enter => enter.append('path')
        .attr('class', 'link')
        .attr('d', d3.linkHorizontal()
          .x(d => d.y)
          .y(d => d.x)),
      update => update.transition().duration(300)
        .attr('d', d3.linkHorizontal()
          .x(d => d.y)
          .y(d => d.x))
    );

    linkSel.exit().remove();

    // nodes
    const nodeSel = g.selectAll('.node')
      .data(root.descendants(), d => d.data.node_id);

    const nodeEnter = nodeSel.enter().append('g')
      .attr('class', d => 'node' + (d._children ? ' collapsed' : ''))
      .attr('transform', d => `translate(${d.y},${d.x})`)
      .on('click', (event, d) => {
        // toggle children
        if (d._children) {
          d.children = d._children;
          d._children = null;
        } else if (d.children) {
          d._children = d.children;
          d.children = null;
        }
        update(d);
      })
      .on('mouseover', (event, d) => {
        const nd = d.data;
        tooltip.style.display = 'block';
        tooltip.innerHTML = `
          <div class="tt-action">${nd.action ?? '(root)'}</div>
          <div class="tt-divider"></div>
          <div class="tt-row"><span>Node ID</span><span>${nd.node_id}</span></div>
          <div class="tt-row"><span>Visits</span><span>${nd.visits?.toLocaleString() ?? '—'}</span></div>
          <div class="tt-row"><span>Minimax value</span><span>${nd.mean_value?.toFixed(6) ?? '—'}</span></div>
          <div class="tt-row"><span>Total reward</span><span>${nd.total_reward?.toFixed(4) ?? '—'}</span></div>
          <div class="tt-row"><span>Turn</span><span>${nd.white_to_move != null ? (nd.white_to_move ? '⬜ White' : '⬛ Black') : '—'}</span></div>
          <div class="tt-row"><span>Terminal</span><span>${nd.is_terminal ? 'Yes' : 'No'}</span></div>
          <div class="tt-row"><span>Children</span><span>${(d.children || d._children || []).length}</span></div>
        `;
      })
      .on('mousemove', event => {
        const { width: tw, height: th } = tooltip.getBoundingClientRect();
        const mainRect = document.getElementById('main').getBoundingClientRect();
        let x = event.clientX - mainRect.left + 14;
        let y = event.clientY - mainRect.top - th / 2;
        if (x + tw > mainRect.width - 10) x = event.clientX - mainRect.left - tw - 14;
        if (y < 4) y = 4;
        if (y + th > mainRect.height - 4) y = mainRect.height - th - 4;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
      })
      .on('mouseleave', () => { tooltip.style.display = 'none'; });

    nodeEnter.append('circle')
      .attr('r', d => nodeRadius(d))
      .attr('fill', d => colorScale(d.data.mean_value ?? 0.5))
      .attr('stroke', d => d3.color(colorScale(d.data.mean_value ?? 0.5)).darker(0.8));

    // label: action name (trimmed to fit)
    nodeEnter.append('text')
      .attr('x', d => (d.children || d._children) ? -NODE_RADIUS - 4 : NODE_RADIUS + 4)
      .attr('text-anchor', d => (d.children || d._children) ? 'end' : 'start')
      .text(d => d.data.action ?? '');

    // merge + update
    const nodeUpdate = nodeSel.merge(nodeEnter)
      .attr('class', d => 'node' + (d._children ? ' collapsed' : ''))
      .transition().duration(300)
      .attr('transform', d => `translate(${d.y},${d.x})`);

    nodeUpdate.select('circle')
      .attr('r', d => nodeRadius(d))
      .attr('fill', d => colorScale(d.data.mean_value ?? 0.5))
      .attr('stroke', d => d3.color(colorScale(d.data.mean_value ?? 0.5)).darker(0.8));

    nodeUpdate.select('text')
      .attr('x', d => (d.children || d._children) ? -NODE_RADIUS - 4 : NODE_RADIUS + 4)
      .attr('text-anchor', d => (d.children || d._children) ? 'end' : 'start')
      .text(d => d.data.action ?? '');

    nodeSel.exit().transition().duration(200)
      .attr('opacity', 0)
      .remove();
  }

  globalUpdate = update;
  update(root);

  // Initial view: root at left-center
  svg.call(
    zoom.transform,
    d3.zoomIdentity.translate(INITIAL_OFFSET_X, height / 2).scale(1)
  );
}

function nodeRadius(d) {
  if (!d.data.visits) return NODE_RADIUS;
  // Scale radius with visit count (log scale, MIN_NODE_RADIUS–MAX_NODE_RADIUS px range)
  const root = globalRoot;
  const maxVisits = root ? root.data.visits : d.data.visits;
  const ratio = Math.log1p(d.data.visits) / Math.log1p(maxVisits);
  return Math.max(MIN_NODE_RADIUS, Math.min(MAX_NODE_RADIUS, NODE_RADIUS + ratio * 6));
}
</script>
</body>
</html>

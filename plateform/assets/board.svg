        <use href="#board-row-even" y="560"/>
        <use href="#board-row-odd" y="640"/>
    </g>
    <g id="overlays-layer"/>
    <g id="pieces-layer">
        <!-- Black -->
        <use href="#piece-ballista" class="p-b p-r" x="0" y="0"/>

        <use href="#piece-paladin" class="p-b p-r" x="600" y="0"/>
        <use href="#piece-knight" class="p-b p-r" x="700" y="0"/>
        <use href="#piece-ballista" class="p-b p-r" x="800" y="0"/>
        <use href="#piece-rook" class="p-b p-r" x="200" y="80"/>
        <use href="#piece-bishop" class="p-b p-r" x="600" y="80"/>
        <use href="#piece-soldier" class="p-b p-r" x="0" y="160"/>

        <use href="#piece-soldier" class="p-w" x="0" y="480"/>
        <use href="#piece-soldier" class="p-w" x="100" y="480"/>
        <use href="#piece-soldier" class="p-w" x="200" y="480"/>
        <use href="#piece-soldier" class="p-w" x="300" y="480"/>
        <use href="#piece-soldier" class="p-w" x="400" y="480"/>

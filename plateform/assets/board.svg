<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -10 920 730">
    <g id="board-layer">
        <use href="#board-row-odd" y="0"/>
        <use href="#board-row-even" y="80"/>
        <use href="#board-row-odd" y="160"/>

# Production Compose file for Keres platform
# Place this file on the production server alongside a .env file containing secrets.
# DO NOT commit this file or the .env to the repository.
#
# Required .env variables (all must be set — no defaults are provided):
#   SERVER_NAME              e.g. playkeres.com
#   APP_SECRET               Symfony app secret (random 32+ char string)
#   POSTGRES_USER            Database user
#   POSTGRES_PASSWORD        Database password
#   POSTGRES_DB              Database name
#   CADDY_MERCURE_JWT_SECRET Mercure JWT secret (random 32+ char string)
#   INFOMANIAK_API_TOKEN     Infomaniak API token for DNS-01 ACME challenge
#
# Optional .env variables:
#   POSTGRES_VERSION         Defaults to 16
#   POSTGRES_CHARSET         Defaults to utf8
#   IMAGES_TAG               Docker image tag to deploy (defaults to latest)

name: keres

x-app-env: &app-env
  APP_ENV: prod
  APP_SECRET: ${APP_SECRET}
  SERVER_NAME: ${SERVER_NAME}
  DEFAULT_URI: https://${SERVER_NAME}
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=${POSTGRES_VERSION:-16}&charset=${POSTGRES_CHARSET:-utf8}
  MERCURE_URL: https://${SERVER_NAME}/.well-known/mercure
  MERCURE_PUBLIC_URL: https://${SERVER_NAME}/.well-known/mercure
  MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET}
  MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
  MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
  BACKEND_API_URL: http://backend:3000

x-php-env: &php-env
  <<: *app-env
  CADDY_GLOBAL_OPTIONS: "acme_dns infomaniak ${INFOMANIAK_API_TOKEN}"
  INFOMANIAK_API_TOKEN: ${INFOMANIAK_API_TOKEN}

services:
  php:
    image: ghcr.io/vincentchalnot/keres/php:${IMAGES_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *php-env
    security_opt:
      - label=disable
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    # Expose only to Traefik via the shared proxy network; no host ports needed.
    # Traefik uses SSL passthrough so Caddy handles TLS end-to-end (required for
    # HTTP/2 and Mercure/SSE to work correctly).
    networks:
      - default
      - proxy
    depends_on:
      database:
        condition: service_healthy
    labels:
      # Enable Traefik for this service
      traefik.enable: "true"
      traefik.docker.network: "proxy"

      # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
      traefik.http.routers.keres-http.rule: "Host(`${SERVER_NAME}`)"
      traefik.http.routers.keres-http.entrypoints: "web"
      traefik.http.routers.keres-http.middlewares: "redirect-to-https@file"

      # ── HTTPS (TCP passthrough — Caddy owns TLS, HTTP/2 + Mercure work) ───
      # We use a TCP router with passthrough so that:
      #   1. Caddy manages its own ACME certificate (autocert).
      #   2. HTTP/2 and SSE/Mercure work without Traefik terminating TLS.
      traefik.tcp.routers.keres-https.rule: "HostSNI(`${SERVER_NAME}`)"
      traefik.tcp.routers.keres-https.entrypoints: "websecure"
      traefik.tcp.routers.keres-https.tls.passthrough: "true"
      traefik.tcp.routers.keres-https.service: "keres-https-svc"
      traefik.tcp.services.keres-https-svc.loadbalancer.server.port: "443"

  php-worker:
    image: ghcr.io/vincentchalnot/keres/php-worker:${IMAGES_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *app-env
    security_opt:
      - label=disable
    healthcheck:
      test: ["CMD", "supervisorctl", "status", "all"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      php:
        condition: service_healthy

  backend:
    image: ghcr.io/vincentchalnot/keres/backend:${IMAGES_TAG:-latest}
    restart: unless-stopped
    environment:
      - RUST_LOG=info

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    # Named volume: data is preserved across container restarts but backed up
    # via the external db-backup.sh script (see crontab setup in README).
    volumes:
      - database_data:/var/lib/postgresql/data:rw

volumes:
  # Caddy certificate store — persisted so autocert isn't re-triggered on every restart.
  caddy_data:
  caddy_config:
  # PostgreSQL data — backed up externally via db-backup.sh.
  database_data:

networks:
  default:
  proxy:
    external: true

# Development Compose file for Keres (workspace root).
#
# Bring up the full local stack on split domains, with Traefik owning TLS:
#   - https://local.playkeres.com           → Hugo static site (dev)
#   - https://app.local.playkeres.com       → Symfony / FrankenPHP app
#   - https://vite.app.local.playkeres.com  → Vite dev server (HMR over WSS)
#   - Mailpit UI                            → http://localhost:8025  (host port)
#
# Prerequisites (handled by the operator, not this file):
#   1. External Traefik must be running on the `proxy` docker network.
#   2. DNS for *.local.playkeres.com must point at 127.0.0.1.
#   3. Copy .env.dev.example to .env and fill in any local secrets.
#
# Usage:
#   docker network create proxy 2>/dev/null || true
#   cp .env.dev.example .env
#   docker compose up --build -d

name: keres-dev

x-app-env: &app-env
  APP_ENV: dev
  SERVER_NAME: app.local.playkeres.com
  DEFAULT_URI: https://app.local.playkeres.com
  CADDY_SITE_ADDRESS: "http://app.local.playkeres.com"   # plain HTTP, Traefik owns TLS
  DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8
  MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
  MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
  MERCURE_URL: https://app.local.playkeres.com/.well-known/mercure
  MERCURE_PUBLIC_URL: https://app.local.playkeres.com/.well-known/mercure
  MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
  BACKEND_API_URL: http://backend:3000
  AI_BACKEND_API_URL: http://backend:3000
  TRUSTED_PROXIES: "${TRUSTED_PROXIES:-172.16.0.0/12,::/0}"

services:
  php:
    build:
      context: ./platform
      target: frankenphp_dev
    restart: unless-stopped
    environment:
      <<: *app-env
      FRANKENPHP_WORKER_CONFIG: watch
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    security_opt:
      - label=disable
    volumes:
      - ./platform:/app
      - ./platform/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./platform/frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      - composer_cache:/.cache/composer
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true
    depends_on:
      database:
        condition: service_healthy
    networks: [default, proxy]
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.keres-app-http.rule: "Host(`app.local.playkeres.com`)"
      traefik.http.routers.keres-app-http.entrypoints: "websecure"
      traefik.http.routers.keres-app-http.tls: "true"
      traefik.http.routers.keres-app-http.tls.certresolver: "${CERT_RESOLVER:-letsencrypt}"
      traefik.http.routers.keres-app-http.service: "keres-app-svc"
      traefik.http.services.keres-app-svc.loadbalancer.server.port: "80"

  php-worker:
    build:
      context: ./platform
      target: frankenphp_worker_dev
    restart: unless-stopped
    environment:
      <<: *app-env
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    security_opt:
      - label=disable
    volumes:
      - ./platform:/app
      - ./platform/frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true
    depends_on:
      php:
        condition: service_healthy

  backend:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - RUST_LOG=info

  node:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./platform:/app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    networks: [default, proxy]
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.keres-vite.rule: "Host(`vite.app.local.playkeres.com`)"
      traefik.http.routers.keres-vite.entrypoints: "websecure"
      traefik.http.routers.keres-vite.tls: "true"
      traefik.http.routers.keres-vite.tls.certresolver: "${CERT_RESOLVER:-letsencrypt}"
      traefik.http.routers.keres-vite.service: "keres-vite-svc"
      traefik.http.services.keres-vite-svc.loadbalancer.server.port: "5173"

  hugo:
    image: hugomods/hugo:ci-0.135.0
    restart: unless-stopped
    working_dir: /src
    volumes:
      - ./website:/src
    command:
      - "server"
      - "--bind=0.0.0.0"
      - "--port=80"
      - "--baseURL=https://local.playkeres.com/"
      - "--environment=development"
      - "--buildDrafts"
      - "--disableFastRender"
      - "--liveReloadPort=443"
    networks: [default, proxy]
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.keres-web.rule: "Host(`local.playkeres.com`)"
      traefik.http.routers.keres-web.entrypoints: "websecure"
      traefik.http.routers.keres-web.tls: "true"
      traefik.http.routers.keres-web.tls.certresolver: "${CERT_RESOLVER:-letsencrypt}"
      traefik.http.routers.keres-web.service: "keres-web-svc"
      traefik.http.services.keres-web-svc.loadbalancer.server.port: "80"

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  mailer:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  composer_cache:
  database_data:

networks:
  default:
  proxy:
    external: true

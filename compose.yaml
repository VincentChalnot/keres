# Production Compose file for Keres platform
# Place this file on the production server alongside a .env file containing secrets.
# DO NOT commit this file or the .env to the repository.
#
# Required .env variables (all must be set — no defaults are provided):
#   SERVER_NAME              e.g. playkeres.com
#   APP_SECRET               Symfony app secret (random 32+ char string)
#   POSTGRES_USER            Database user
#   POSTGRES_PASSWORD        Database password
#   POSTGRES_DB              Database name
#   MERCURE_JWT_SECRET Mercure JWT secret (random 32+ char string)
#   INFOMANIAK_API_TOKEN     Infomaniak API token for DNS-01 ACME (consumed by
#                            the Traefik service on the prod server, not here)
#
# Optional .env variables:
#   POSTGRES_VERSION         Defaults to 16
#   POSTGRES_CHARSET         Defaults to utf8
#   IMAGES_TAG               Docker image tag to deploy (defaults to latest)
#   TRUSTED_PROXIES          Comma-separated CIDR/IPs trusted to set
#                            X-Forwarded-* headers. Defaults to 172.16.0.0/12,::/0
#                            (covers default docker subnets). Tighten to the
#                            proxy network's actual CIDR if desired.

name: keres

x-app-env: &app-env
  APP_ENV: prod
  DEFAULT_URI: https://${SERVER_NAME}
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=${POSTGRES_VERSION:-16}&charset=${POSTGRES_CHARSET:-utf8}
  MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
  MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
  MERCURE_URL: https://${SERVER_NAME}/.well-known/mercure
  MERCURE_PUBLIC_URL: https://${SERVER_NAME}/.well-known/mercure

x-php-env: &php-env
  <<: *app-env
  # Caddy listens on plain HTTP (:80) — Traefik owns TLS and ACME now.
  CADDY_SITE_ADDRESS: "http://${SERVER_NAME}"
  # Trust the docker proxy network so Symfony walks X-Forwarded-For and
  # Request::getClientIp() returns the real client instead of Traefik's IP.
  # 172.16.0.0/12 covers default docker subnets; tighten to the proxy
  # network's CIDR if desired (docker network inspect proxy).
  TRUSTED_PROXIES: "${TRUSTED_PROXIES:-172.16.0.0/12,::/0}"

services:
  php:
    image: ghcr.io/vincentchalnot/keres/php:${IMAGES_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *php-env
    security_opt:
      - label=disable
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    # Expose only to Traefik via the shared proxy network; no host ports needed.
    # Traefik terminates TLS (Infomaniak DNS-01 ACME) and forwards cleartext
    # HTTP to Caddy on :80.  X-Forwarded-For is injected by Traefik; Symfony
    # trusts the proxy network via TRUSTED_PROXIES to recover the real client IP.
    networks:
      - default
      - proxy
    depends_on:
      database:
        condition: service_healthy
    labels:
      # Enable Traefik for this service
      traefik.enable: "true"
      traefik.docker.network: "proxy"

      # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
      traefik.http.routers.keres-http.rule: "Host(`${SERVER_NAME}`)"
      traefik.http.routers.keres-http.entrypoints: "web"
      traefik.http.routers.keres-http.middlewares: "keres-redirect-https"
      traefik.http.middlewares.keres-redirect-https.redirectscheme.scheme: "https"
      traefik.http.middlewares.keres-redirect-https.redirectscheme.permanent: "true"

      # ── HTTPS — Traefik terminates TLS, forwards cleartext HTTP to Caddy:80
      # Traefik owns ACME (Infomaniak DNS-01, configured in traefik.yml) and
      # injects X-Forwarded-For automatically on HTTP routers.
      traefik.http.routers.keres-https.rule: "Host(`${SERVER_NAME}`)"
      traefik.http.routers.keres-https.entrypoints: "websecure"
      traefik.http.routers.keres-https.tls: "true"
      traefik.http.routers.keres-https.tls.certresolver: "letsencrypt"
      traefik.http.routers.keres-https.service: "keres-https-svc"
      traefik.http.services.keres-https-svc.loadbalancer.server.port: "80"

  php-worker:
    image: ghcr.io/vincentchalnot/keres/php-worker:${IMAGES_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    security_opt:
      - label=disable
    healthcheck:
      test: ["CMD", "supervisorctl", "status", "all"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      php:
        condition: service_healthy

  backend:
    image: ghcr.io/vincentchalnot/keres/backend:${IMAGES_TAG:-latest}
    restart: unless-stopped
    environment:
      - RUST_LOG=info

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    # Named volume: data is preserved across container restarts but backed up
    # via the external db-backup.sh script (see crontab setup in README).
    volumes:
      - database_data:/var/lib/postgresql/data:rw

volumes:
  # Caddy runtime state (Mercure subscriptions, etc.).  Caddy no longer stores
  # ACME certs — Traefik owns TLS now — but still uses /data for ephemeral state.
  caddy_data:
  caddy_config:
  # PostgreSQL data — backed up externally via db-backup.sh.
  database_data:

networks:
  default:
  proxy:
    external: true

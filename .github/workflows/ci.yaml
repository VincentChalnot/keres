name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-base:
    name: Build Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Check if Dockerfile.base changed
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD 2>/dev/null | grep -q '^platform/Dockerfile.base$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.filter.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push php-base image
        if: steps.filter.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./platform
          file: ./platform/Dockerfile.base
          push: true
          tags: |
            ghcr.io/vincentchalnot/keres/php-base:latest
            ghcr.io/vincentchalnot/keres/php-base:${{ github.sha }}
          cache-from: type=gha,scope=php-base
          cache-to: type=gha,scope=php-base,mode=max

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: build-base
    # Run whether build-base was skipped (no Dockerfile.base changes) or succeeded
    if: always() && needs.build-base.result != 'failure'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build php image
        uses: docker/build-push-action@v6
        with:
          context: ./platform
          file: ./platform/Dockerfile
          target: frankenphp_prod
          push: false
          load: true
          tags: ghcr.io/vincentchalnot/keres/php:${{ github.sha }}
          cache-from: type=gha,scope=php-platform
          cache-to: type=gha,scope=php-platform,mode=max

      - name: Build php-worker image
        uses: docker/build-push-action@v6
        with:
          context: ./platform
          file: ./platform/Dockerfile
          target: frankenphp_worker_prod
          push: false
          load: true
          tags: ghcr.io/vincentchalnot/keres/php-worker:${{ github.sha }}
          cache-from: type=gha,scope=php-platform

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: false
          load: true
          tags: ghcr.io/vincentchalnot/keres/backend:${{ github.sha }}
          cache-from: |
            type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  # Tests are currently skipped — verify they work locally before enabling.
  # When ready:
  #   1. Remove the `if: false` line below.
  #   2. Wire the production images built in the `build` job (e.g. via a
  #      ci-specific compose override that sets IMAGES_TAG=${{ github.sha }}).
  #   3. Uncomment and adapt the PHPUnit / migration steps.
  # tests:
  #   name: Tests
  #   runs-on: ubuntu-latest
  #   needs: build
  #   steps:
  #     ...

  push:
    name: Push Images
    runs-on: ubuntu-latest
    # Only push on commits to main, not on pull requests.
    if: always() && github.event_name != 'pull_request' && needs.build.result == 'success'
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push php image
        uses: docker/build-push-action@v6
        with:
          context: ./platform
          file: ./platform/Dockerfile
          target: frankenphp_prod
          push: true
          tags: |
            ghcr.io/vincentchalnot/keres/php:latest
            ghcr.io/vincentchalnot/keres/php:${{ github.sha }}
          cache-from: type=gha,scope=php-platform

      - name: Push php-worker image
        uses: docker/build-push-action@v6
        with:
          context: ./platform
          file: ./platform/Dockerfile
          target: frankenphp_worker_prod
          push: true
          tags: |
            ghcr.io/vincentchalnot/keres/php-worker:latest
            ghcr.io/vincentchalnot/keres/php-worker:${{ github.sha }}
          cache-from: type=gha,scope=php-platform

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: true
          tags: |
            ghcr.io/vincentchalnot/keres/backend:latest
            ghcr.io/vincentchalnot/keres/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend

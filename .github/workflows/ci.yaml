name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        # Informational only until the existing warning backlog is cleared —
        # does not block CI. Remove continue-on-error once clean.
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true

  build:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ghcr.io/vincentchalnot/keres/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  push:
    name: Push backend image
    runs-on: ubuntu-latest
    needs: build
    # Only push on commits to main, not on pull requests.
    if: always() && github.event_name != 'pull_request' && needs.build.result == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/vincentchalnot/keres/backend:latest
            ghcr.io/vincentchalnot/keres/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend

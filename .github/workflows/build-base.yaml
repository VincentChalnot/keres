name: Build Base Image

on:
  push:
    branches:
      - main
    paths:
      - plateform/Dockerfile.base
  workflow_dispatch: ~

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-base:
    name: Build & Push php-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push php-base image
        uses: docker/build-push-action@v6
        with:
          context: ./plateform
          file: ./plateform/Dockerfile.base
          push: true
          tags: |
            ghcr.io/vincentchalnot/keres/php-base:latest
            ghcr.io/vincentchalnot/keres/php-base:${{ github.sha }}
          cache-from: type=gha,scope=php-base
          cache-to: type=gha,scope=php-base,mode=max
